services:
  choreography:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:./data/choreography.db
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production-must-be-at-least-32-chars!!}
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
